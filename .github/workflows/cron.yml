name: Reporte UAN Programado

on:
  schedule:
    # 7:00 AM UTC son las 2:00 AM en Bogotá
    - cron: '0 7 * * *'
  workflow_dispatch: # Esto te permite darle al botón "Run" y probarlo YA

jobs:
  ejecutar-reporte:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerias
        run: pip install requests

      - name: Correr el script
        env:
          # Aquí es donde ocurre la magia de la seguridad
          UAN_USER: ${{ secrets.UAN_USER }}
          UAN_PASS: ${{ secrets.UAN_PASS }}
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: python main.py
